<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Delete Context</title>
</head>
<body>
<main class="main-content">
    <h1>Delete Context</h1>
    <div class="delete-card">
        <p>Are you sure you want to delete context "<strong th:text="${context.name()}"></strong>"?</p>
        <div class="delete-actions">
            <form method="post" th:action="@{/admin/contexts/delete/{id}(id=${context.id()})}">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/admin/contexts}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</main>
</body>
</html>
