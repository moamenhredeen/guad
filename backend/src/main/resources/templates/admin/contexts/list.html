<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Contexts</title>
</head>
<body>

<main class="main-content">
    <h1>Contexts</h1>

    <form method="get" th:action="@{/admin/contexts}" class="search-toolbar">
        <input type="text" name="search" placeholder="Search by name..." th:value="${search}">
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <table class="admin-table">
        <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Description</th>
            <th>Color</th>
            <th class="actions">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="context : ${contexts}">
            <td th:text="${context.id()}"></td>
            <td th:text="${context.name()}"></td>
            <td th:text="${context.description()}"></td>
            <td th:text="${context.color()}"></td>
            <td class="actions">
                <a th:href="@{/admin/contexts/{id}(id=${context.id()})}">View</a>
                <a th:href="@{/admin/contexts/delete/{id}(id=${context.id()})}" class="delete-link">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{admin/fragments/pagination :: pagination}"></div>
</main>

</body>
</html>
