<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="attachment-grid(attachments)" class="mt-4">
  <h2>Attachments</h2>
  <div th:if="${attachments != null && !attachments.isEmpty()}" class="attachment-grid">
    <a th:each="attachment : ${attachments}"
       th:href="@{/admin/attachments/{id}(id=${attachment.id()})}"
       class="attachment-card">
      <div th:if="${attachment.mimeType() != null and attachment.mimeType().startsWith('image/')}" class="preview">
        <img th:src="${attachment.downloadUrl()}" th:alt="${attachment.filename()}">
      </div>
      <div th:if="${attachment.mimeType() == null or !attachment.mimeType().startsWith('image/')}" class="preview-placeholder">📄</div>
      <h6 th:text="${attachment.filename()}"></h6>
      <small>
        <span th:text="${#numbers.formatDecimal(attachment.fileSize() / 1024.0, 1, 2)} + ' KB'"></span>
        <span th:if="${attachment.mimeType() != null}" th:text="' · ' + ${attachment.mimeType()}"></span>
      </small>
    </a>
  </div>
  <p th:if="${attachments == null || attachments.isEmpty()}" class="text-muted">No attachments</p>
</div>

</body>
</html>
