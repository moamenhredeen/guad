<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Error</title>
</head>
<body>
<main class="main-content">
    <div class="error-page">
        <h1>Something went wrong</h1>
        <p class="error-status">Status: <span th:text="${status}">500</span> — <span th:text="${error}">Internal Server Error</span></p>
        <p th:if="${message}" th:text="${message}"></p>
        <a th:href="@{/admin/dashboard}" class="btn btn-primary">Back to Dashboard</a>
    </div>
</main>
</body>
</html>
