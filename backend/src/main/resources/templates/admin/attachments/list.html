<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Dashboard</title>
</head>
<body>

<main>
    <h1>Attachment List</h1>

    <form method="get" th:action="@{/admin/attachments}">
        <div class="grid">
            <input type="text" 
                   name="search" 
                   placeholder="Search by filename, MIME type, user, or ID..."
                   th:value="${search}">
            <button type="submit">Search</button>
        </div>
    </form>

    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Filename</th>
            <th>Size</th>
            <th>Type</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="attachment : ${attachments}">
            <td>
                <a th:href="@{/admin/attachments/{id}(id=${attachment.id()})}"
                   th:text="${attachment.id()}"></a>
            </td>
            <td th:text="${attachment.filename()}"></td>
            <td th:text="${#numbers.formatDecimal(attachment.fileSize() / 1024.0, 1, 2)} + ' KB'"></td>
            <td th:text="${attachment.mimeType()}"></td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
