<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Delete Attachment</title>
</head>
<body>
<main class="main-content">
    <h1>Delete Attachment</h1>
    <div class="delete-card">
        <p>Are you sure you want to delete attachment "<strong th:text="${attachment.filename()}"></strong>"?</p>
        <div class="delete-actions">
            <form method="post" th:action="@{/admin/attachments/delete/{id}(id=${attachment.id()})}">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/admin/attachments}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</main>
</body>
</html>
