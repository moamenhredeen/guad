<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Delete Action</title>
</head>
<body>
<main class="main-content">
    <h1>Delete Action</h1>
    <div class="delete-card">
        <p>Are you sure you want to delete action "<strong th:text="${action.description()}"></strong>"?</p>
        <div class="delete-actions">
            <form method="post" th:action="@{/admin/actions/delete/{id}(id=${action.id()})}">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/admin/actions}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</main>
</body>
</html>
