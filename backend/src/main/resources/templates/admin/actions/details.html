<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
  <title>Guad - Action Details</title>
</head>
<body>

<main>
  <h1>Action Details</h1>

  <ul>
    <li>Id: <span th:text="${action.id()}"></span></li>
    <li>Description: <span th:text="${action.description()}"></span></li>
    <li>Notes: <span th:text="${action.notes()}"></span></li>
    <li>Status: <span th:text="${action.status()}"></span></li>
    <li>Time Specific: <span th:text="${action.isTimeSpecific()}"></span></li>
    <li>Estimated Duration: <span th:text="${action.estimatedDuration()}"></span> minutes</li>
    <li>Energy Level: <span th:text="${action.energyLevel()}"></span></li>
    <li>Location: <span th:text="${action.location()}"></span></li>
    <li>Created Date: <span th:text="${action.createdDate()}"></span></li>
    <li>Updated Date: <span th:text="${action.updatedDate()}"></span></li>
    <li>Completed Date: <span th:text="${action.completedDate()}"></span></li>
    <li>Scheduled Date: <span th:text="${action.scheduledDate()}"></span></li>
    <li>Due Date: <span th:text="${action.dueDate()}"></span></li>
    <li>Project: <a th:if="${action.projectId() != null}"
                     th:href="@{/admin/projects/{id}(id=${action.projectId()})}"
                     th:text="${action.projectName()}"></a>
        <span th:if="${action.projectId() == null}">None</span></li>
    <li>Area: <a th:if="${action.areaId() != null}"
                 th:href="@{/admin/areas/{id}(id=${action.areaId()})}"
                 th:text="${action.areaName()}"></a>
        <span th:if="${action.areaId() == null}">None</span></li>
    <li>Contexts:
        <ul th:if="${action.contextNames() != null and !action.contextNames().isEmpty()}">
            <li th:each="contextName : ${action.contextNames()}" th:text="${contextName}"></li>
        </ul>
        <span th:if="${action.contextNames() == null or action.contextNames().isEmpty()}">None</span>
    </li>
  </ul>

  <div th:replace="~{admin/fragments/attachments :: attachment-grid(${action.attachments()})}"></div>
</main>

</body>
</html>
