<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Action Details</title>
</head>
<body>

<main class="main-content">
    <h1>Action Details</h1>

    <dl class="detail-list">
        <dt>Id</dt>
        <dd th:text="${action.id()}"></dd>
        <dt>Description</dt>
        <dd th:text="${action.description()}"></dd>
        <dt>Notes</dt>
        <dd th:text="${action.notes()}"></dd>
        <dt>Status</dt>
        <dd th:text="${action.status()}"></dd>
        <dt>Time Specific</dt>
        <dd th:text="${action.isTimeSpecific()}"></dd>
        <dt>Duration</dt>
        <dd><span th:if="${action.estimatedDuration()}" th:text="${action.estimatedDuration()} + ' minutes'"></span></dd>
        <dt>Energy Level</dt>
        <dd th:text="${action.energyLevel()}"></dd>
        <dt>Location</dt>
        <dd th:text="${action.location()}"></dd>
        <dt>Created</dt>
        <dd th:text="${action.createdDate()}"></dd>
        <dt>Updated</dt>
        <dd th:text="${action.updatedDate()}"></dd>
        <dt>Completed</dt>
        <dd th:text="${action.completedDate()}"></dd>
        <dt>Scheduled</dt>
        <dd th:text="${action.scheduledDate()}"></dd>
        <dt>Due Date</dt>
        <dd th:text="${action.dueDate()}"></dd>
        <dt>Project</dt>
        <dd>
            <a th:if="${action.projectId() != null}" th:href="@{/admin/projects/{id}(id=${action.projectId()})}" th:text="${action.projectName()}"></a>
            <span th:if="${action.projectId() == null}" class="text-muted">None</span>
        </dd>
        <dt>Area</dt>
        <dd>
            <a th:if="${action.areaId() != null}" th:href="@{/admin/areas/{id}(id=${action.areaId()})}" th:text="${action.areaName()}"></a>
            <span th:if="${action.areaId() == null}" class="text-muted">None</span>
        </dd>
        <dt>Contexts</dt>
        <dd>
            <span th:if="${action.contextNames() != null and !action.contextNames().isEmpty()}" th:text="${#strings.listJoin(action.contextNames(), ', ')}"></span>
            <span th:if="${action.contextNames() == null or action.contextNames().isEmpty()}" class="text-muted">None</span>
        </dd>
    </dl>

    <div th:replace="~{admin/fragments/attachments :: attachment-grid(${action.attachments()})}"></div>
</main>

</body>
</html>
