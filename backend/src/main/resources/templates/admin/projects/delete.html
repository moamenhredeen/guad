<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Delete Project</title>
</head>
<body>
<main class="main-content">
    <h1>Delete Project</h1>
    <div class="delete-card">
        <p>Are you sure you want to delete project "<strong th:text="${viewModel.name()}"></strong>"?</p>
        <div class="delete-actions">
            <form method="post" th:action="@{/admin/projects/delete/{id}(id=${viewModel.id()})}">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/admin/projects}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</main>
</body>
</html>
