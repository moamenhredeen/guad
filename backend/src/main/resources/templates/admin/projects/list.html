<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Projects</title>
</head>
<body>

<main>
    <h1>Project List</h1>
    <form method="get" th:action="@{/admin/projects}">
        <div class="grid">
            <input type="text" 
                   name="search" 
                   placeholder="Search by name or ID..."
                   th:value="${search}">
            <button type="submit">Search</button>
        </div>
    </form>

    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Area</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td>
                <a th:href="@{/admin/projects/{id}(id=${project.id()})}"
                   th:text="${project.id()}"></a>
            </td>
            <td th:text="${project.name()}"></td>
            <td th:text="${project.description()}"></td>
            <td th:text="${project.status()}"></td>
            <td th:text="${project.areaName()}"></td>
            <td>
                <a th:href="@{/admin/projects/edit/{id}(id=${project.id()})}">Edit</a>
                | <a th:href="@{/admin/projects/delete/{id}(id=${project.id()})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
