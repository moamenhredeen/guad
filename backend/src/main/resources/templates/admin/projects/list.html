<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Projects</title>
</head>
<body>

<main class="main-content">
    <h1>Projects</h1>

    <form method="get" th:action="@{/admin/projects}" class="search-toolbar">
        <input type="text" name="search" placeholder="Search by name..." th:value="${search}">
        <select name="status">
            <option value="">All Statuses</option>
            <option th:each="s : ${statuses}" th:value="${s}" th:selected="${s == status}" th:text="${s}"></option>
        </select>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <table class="admin-table">
        <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Area</th>
            <th class="actions">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.id()}"></td>
            <td th:text="${project.name()}"></td>
            <td th:text="${project.description()}"></td>
            <td th:text="${project.status()}"></td>
            <td th:text="${project.areaName()}"></td>
            <td class="actions">
                <a th:href="@{/admin/projects/{id}(id=${project.id()})}">View</a>
                <a th:href="@{/admin/projects/delete/{id}(id=${project.id()})}" class="delete-link">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{admin/fragments/pagination :: pagination}"></div>
</main>

</body>
</html>
