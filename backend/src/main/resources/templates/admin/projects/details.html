<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Project Details</title>
</head>
<body>

<main class="main-content">
    <h1>Project Details</h1>

    <dl class="detail-list">
        <dt>Id</dt>
        <dd th:text="${project.id()}"></dd>
        <dt>Name</dt>
        <dd th:text="${project.name()}"></dd>
        <dt>Description</dt>
        <dd th:text="${project.description()}"></dd>
        <dt>Desired Outcome</dt>
        <dd th:text="${project.desiredOutcome()}"></dd>
        <dt>Status</dt>
        <dd th:text="${project.status()}"></dd>
        <dt>Created</dt>
        <dd th:text="${project.createdDate() != null ? #temporals.format(project.createdDate(), 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>
        <dt>Updated</dt>
        <dd th:text="${project.updatedDate() != null ? #temporals.format(project.updatedDate(), 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>
        <dt>Completed</dt>
        <dd th:text="${project.completedDate() != null ? #temporals.format(project.completedDate(), 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>
        <dt>Color</dt>
        <dd th:text="${project.color()}"></dd>
        <dt>Area</dt>
        <dd>
            <a th:if="${project.areaId() != null}" th:href="@{/admin/areas/{id}(id=${project.areaId()})}" th:text="${project.areaName()}"></a>
            <span th:if="${project.areaId() == null}" class="text-muted">None</span>
        </dd>
    </dl>

    <div th:replace="~{admin/fragments/attachments :: attachment-grid(${project.attachments()})}"></div>

    <div class="mt-4">
        <h2>Actions</h2>

        <form method="get" th:action="@{/admin/projects/{id}(id=${project.id()})}" class="search-toolbar mb-2">
            <input type="hidden" name="documentSearch" th:value="${documentSearchKeyword != null ? documentSearchKeyword : ''}">
            <input type="text" name="actionSearch" placeholder="Search actions by description or ID..." th:value="${actionSearchKeyword != null ? actionSearchKeyword : ''}">
            <button type="submit" class="btn btn-primary">Search Actions</button>
        </form>

        <div th:if="${actionSearchResults != null and !actionSearchResults.isEmpty()}" class="card mb-2">
            <h3 class="text-muted">Search Results — Click to Add</h3>
            <div th:each="action : ${actionSearchResults}" style="padding: 0.5rem 0; border-bottom: 1px solid var(--bw-grau-10);">
                <form method="post" th:action="@{/admin/projects/{id}/add-action(id=${project.id()})}" style="display: inline;">
                    <input type="hidden" name="actionId" th:value="${action.id()}">
                    <button type="submit" class="btn btn-outline" style="text-align: left;">
                        <strong th:text="${action.description()}"></strong>
                        <span class="text-muted" th:text="' (ID: ' + ${action.id()} + ', Status: ' + ${action.status()} + ')'"></span>
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${project.actions() != null && !project.actions().isEmpty()}" class="attachment-grid">
            <div th:each="action : ${project.actions()}" class="card" style="position: relative;">
                <a th:href="@{/admin/actions/{id}(id=${action.id()})}" style="text-decoration: none; color: inherit;">
                    <h3 style="margin-bottom: 0.25rem;" th:text="${action.description()}"></h3>
                    <small class="text-muted" th:text="${action.status()}"></small>
                </a>
                <form method="post" th:action="@{/admin/projects/{id}/remove-action(id=${project.id()})}" style="position: absolute; top: 0.75rem; right: 0.75rem;">
                    <input type="hidden" name="actionId" th:value="${action.id()}">
                    <button type="submit" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Remove</button>
                </form>
            </div>
        </div>
        <p th:if="${project.actions() == null || project.actions().isEmpty()}" class="text-muted mt-2">No actions</p>
    </div>

    <div class="mt-4">
        <h2>Documents</h2>

        <form method="get" th:action="@{/admin/projects/{id}(id=${project.id()})}" class="search-toolbar mb-2">
            <input type="hidden" name="actionSearch" th:value="${actionSearchKeyword != null ? actionSearchKeyword : ''}">
            <input type="text" name="documentSearch" placeholder="Search documents by name or ID..." th:value="${documentSearchKeyword != null ? documentSearchKeyword : ''}">
            <button type="submit" class="btn btn-primary">Search Documents</button>
        </form>

        <div th:if="${documentSearchResults != null and !documentSearchResults.isEmpty()}" class="card mb-2">
            <h3 class="text-muted">Search Results — Click to Add</h3>
            <div th:each="document : ${documentSearchResults}" style="padding: 0.5rem 0; border-bottom: 1px solid var(--bw-grau-10);">
                <form method="post" th:action="@{/admin/projects/{id}/add-document(id=${project.id()})}" style="display: inline;">
                    <input type="hidden" name="documentId" th:value="${document.id()}">
                    <button type="submit" class="btn btn-outline" style="text-align: left;">
                        <strong th:text="${document.name()}"></strong>
                        <span class="text-muted" th:text="' (ID: ' + ${document.id()} + ')'"></span>
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${project.documents() != null && !project.documents().isEmpty()}" class="attachment-grid">
            <div th:each="document : ${project.documents()}" class="card" style="position: relative;">
                <a th:href="@{/admin/documents/{id}(id=${document.id()})}" style="text-decoration: none; color: inherit;">
                    <h3 style="margin-bottom: 0.25rem;" th:text="${document.name()}"></h3>
                    <small class="text-muted" th:text="${document.content()}"></small>
                </a>
                <form method="post" th:action="@{/admin/projects/{id}/remove-document(id=${project.id()})}" style="position: absolute; top: 0.75rem; right: 0.75rem;">
                    <input type="hidden" name="documentId" th:value="${document.id()}">
                    <button type="submit" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Remove</button>
                </form>
            </div>
        </div>
        <p th:if="${project.documents() == null || project.documents().isEmpty()}" class="text-muted mt-2">No documents</p>
    </div>
</main>

</body>
</html>
