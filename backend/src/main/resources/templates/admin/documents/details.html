<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
  <title>Guad - Document Details</title>
</head>
<body>

<main>
  <h1>Document Details</h1>

  <ul>
    <li>Id: <span th:text="${document.id()}"></span></li>
    <li>Name: <span th:text="${document.name()}"></span></li>
    <li>Content: <span th:text="${document.content()}"></span></li>
  </ul>

  <div th:if="${document.attachments() != null && !document.attachments().isEmpty()}" style="margin-top: 2rem;">
    <h2>Attachments</h2>
    <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
      <article th:each="attachment : ${document.attachments()}" style="padding: 1rem; border: 1px solid var(--pico-border-color); border-radius: 4px;">
        <a th:href="@{/admin/attachments/{id}(id=${attachment.id()})}" style="text-decoration: none; color: inherit;">
          <div th:if="${attachment.mimeType() != null and attachment.mimeType().startsWith('image/')}" style="text-align: center; margin-bottom: 0.5rem;">
            <img th:src="${attachment.downloadUrl()}" 
                 th:alt="${attachment.filename()}" 
                 style="max-width: 100%; max-height: 150px; object-fit: contain; border-radius: 4px;">
          </div>
          <div th:if="${attachment.mimeType() == null or !attachment.mimeType().startsWith('image/')}" style="text-align: center; margin-bottom: 0.5rem; padding: 2rem; background-color: var(--pico-muted-border-color); border-radius: 4px;">
            <span style="font-size: 3rem;">📄</span>
          </div>
          <h6 style="margin: 0.5rem 0 0.25rem 0; word-break: break-word;" th:text="${attachment.filename()}"></h6>
          <small style="color: var(--pico-muted-color);">
            <span th:text="${#numbers.formatDecimal(attachment.fileSize() / 1024.0, 1, 2)} + ' KB'"></span>
            <span th:if="${attachment.mimeType() != null}" th:text="' · ' + ${attachment.mimeType()}"></span>
          </small>
        </a>
      </article>
    </div>
  </div>
  <div th:if="${document.attachments() == null || document.attachments().isEmpty()}" style="margin-top: 2rem;">
    <h2>Attachments</h2>
    <p>No attachments</p>
  </div>
</main>

</body>
</html>
