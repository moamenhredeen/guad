<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Delete Document</title>
</head>
<body>
<main class="main-content">
    <h1>Delete Document</h1>
    <div class="delete-card">
        <p>Are you sure you want to delete document "<strong th:text="${document.name()}"></strong>"?</p>
        <div class="delete-actions">
            <form method="post" th:action="@{/admin/documents/delete/{id}(id=${document.id()})}">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/admin/documents}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</main>
</body>
</html>
