<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Documents</title>
</head>
<body>

<main class="main-content">
    <h1>Documents</h1>

    <form method="get" th:action="@{/admin/documents}" class="search-toolbar">
        <input type="text" name="search" placeholder="Search by name..." th:value="${search}">
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <table class="admin-table">
        <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Project</th>
            <th class="actions">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="document : ${documents}">
            <td th:text="${document.id()}"></td>
            <td th:text="${document.name()}"></td>
            <td th:text="${document.projectName()}"></td>
            <td class="actions">
                <a th:href="@{/admin/documents/{id}(id=${document.id()})}">View</a>
                <a th:href="@{/admin/documents/delete/{id}(id=${document.id()})}" class="delete-link">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{admin/fragments/pagination :: pagination}"></div>
</main>

</body>
</html>
