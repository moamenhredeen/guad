<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Dashboard</title>
</head>
<body>

<main>
    <h1>Inbox Item List</h1>

    <form method="get" th:action="@{/admin/inbox}">
        <div class="grid">
            <input type="text" 
                   name="search" 
                   placeholder="Search by title or ID..."
                   th:value="${search}">
            <select name="status">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}"
                        th:value="${s.name()}"
                        th:selected="${s == status}"
                        th:text="${s}"></option>
            </select>
            <button type="submit">Search</button>
        </div>
    </form>

    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="inboxItem : ${inboxItems}">
            <td>
                <a th:href="@{/admin/inbox/{id}(id=${inboxItem.id()})}"
                   th:text="${inboxItem.id()}"></a>
            </td>
            <td th:text="${inboxItem.title()}"></td>
            <td th:text="${inboxItem.description()}"></td>
            <td th:text="${inboxItem.status()}"></td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
