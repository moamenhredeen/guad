<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Inbox Item Details</title>
</head>
<body>

<main class="main-content">
    <h1>Inbox Item Details</h1>

    <dl class="detail-list">
        <dt>Id</dt>
        <dd th:text="${inboxItem.id()}"></dd>
        <dt>Title</dt>
        <dd th:text="${inboxItem.title()}"></dd>
        <dt>Description</dt>
        <dd th:text="${inboxItem.description()}"></dd>
        <dt>Status</dt>
        <dd th:text="${inboxItem.status()}"></dd>
    </dl>

    <div th:replace="~{admin/fragments/attachments :: attachment-grid(${inboxItem.attachments()})}"></div>

    <div class="mt-4">
        <a th:href="@{/admin/inbox/{id}/create-action(id=${inboxItem.id()})}" class="btn btn-primary">Create Action from this Item</a>
    </div>
</main>

</body>
</html>
