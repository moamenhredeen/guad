<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::title}, ~{::main})}" lang="en">
<head>
    <title>Guad - Delete Area</title>
</head>
<body>
<main class="main-content">
    <h1>Delete Area</h1>
    <div class="delete-card">
        <p>Are you sure you want to delete area "<strong th:text="${area.name()}"></strong>"?</p>
        <div class="delete-actions">
            <form method="post" th:action="@{/admin/areas/delete/{id}(id=${area.id()})}">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/admin/areas}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</main>
</body>
</html>
