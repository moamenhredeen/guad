<h2>Quick Capture — No Input Chrome</h2>
<p class="subtitle">Just text on white. The content is the interface.</p>

<div style="display: flex; justify-content: center;">
  <div class="mockup" style="max-width: 400px;">
    <div class="mockup-header">Quick Capture — Bare Text</div>
    <div class="mockup-body" style="padding: 0; background: rgba(42,38,35,0.4); font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; max-width: 375px; margin: 0 auto; position: relative; min-height: 580px;">

      <!-- Dimmed background -->
      <div style="padding: 50px 20px; text-align: center;">
        <div style="font-size: 13px; color: rgba(255,255,255,0.4);">(current screen dimmed behind)</div>
      </div>

      <!-- Bottom sheet -->
      <div style="position: absolute; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 12px 20px 32px;">
        <!-- Handle -->
        <div style="width: 36px; height: 4px; background: #E4E0E0; border-radius: 2px; margin: 0 auto 20px;"></div>

        <!-- Title -->
        <div style="font-family: Georgia, serif; font-size: 20px; font-weight: 700; color: #2A2623; margin-bottom: 24px;">Quick Capture</div>

        <!-- Just raw text, no decoration -->
        <div style="font-size: 17px; color: #2A2623; margin-bottom: 6px; padding-left: 2px;">Buy birthday gift for Ma<span style="border-right: 2px solid #309AAF;">​</span></div>

        <div style="font-size: 14px; color: #BBB6B5; margin-bottom: 32px; padding-left: 2px;">Add a note...</div>

        <!-- Save button -->
        <div style="padding: 14px; background: #FFFC00; border-radius: 12px; text-align: center; font-weight: 600; font-size: 15px; color: #2A2623;">Save to Inbox</div>
      </div>
    </div>
  </div>
</div>
